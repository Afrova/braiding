<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Онлайн-запись</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #fffafa; font-family: 'Segoe UI', system-ui, sans-serif; }
    .nav-link.active { color: #d950a9; font-weight: bold; border-bottom: 2px solid #d950a9; }
    .filter-input, select { border: 1px solid #e5e7eb; padding: 0.75rem; border-radius: 0.75rem; background: white; width: 100%; }
  </style>
</head>
<body class="text-gray-800">
  <nav class="bg-white shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 flex flex-wrap justify-between items-center py-4">
      <a href="index.html" class="text-2xl font-bold" style="color: #d950a9;">Beauty Studio</a>
      <div class="flex flex-wrap gap-2 text-sm items-center">
        <a href="index.html" class="nav-link px-2 py-1 rounded">Главная</a>
        <a href="catalog-sets.html" class="nav-link px-2 py-1 rounded">Комплекты</a>
        <a href="masters.html" class="nav-link px-2 py-1 rounded">Мастера</a>
        <a href="portfolio.html" class="nav-link px-2 py-1 rounded">Работы</a>
        <a href="useful.html" class="nav-link px-2 py-1 rounded">Полезное</a>
        <a href="models.html" class="nav-link px-2 py-1 rounded">Модели</a>
        <a href="promotions.html" class="nav-link px-2 py-1 rounded">Акции</a>
        <a href="masterclasses.html" class="nav-link px-2 py-1 rounded">Мастер-классы</a>
        <a href="booking.html" class="nav-link px-2 py-1 rounded active">Запись</a>
        <a href="profile.html" class="nav-link px-2 py-1 rounded">👤 ЛК</a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <h2 class="text-4xl font-bold mb-8" style="background: linear-gradient(135deg, #d950a9, #a532c2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Онлайн-запись</h2>
    <form id="booking-form" class="max-w-md bg-white p-8 rounded-2xl shadow space-y-4">
      <input type="text" id="booking-name" placeholder="Ваше имя" class="filter-input" required>
      <input type="tel" id="booking-phone" placeholder="Телефон" class="filter-input" required>
      <select id="booking-service" class="filter-input" required>
        <option value="">Выберите услугу</option><option>Дреды</option><option>Косы</option><option>Локоны</option><option>Свободный конец</option>
      </select>
      <input type="date" id="booking-date" class="filter-input" required>
      <input type="time" id="booking-time" class="filter-input" required>
      <button type="submit" class="w-full py-3 rounded-xl font-bold text-white" style="background: linear-gradient(135deg, #d950a9, #a532c2);">Записаться</button>
    </form>
    <p id="booking-success" class="text-green-600 mt-4 text-center hidden">✅ Запись успешно создана!</p>
  </main>

  <footer class="bg-gray-900 text-white mt-20">
    <div class="container mx-auto px-4 py-8 text-center text-gray-400">© 2024 Beauty Studio</div>
  </footer>

  <script>
    document.getElementById('booking-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const booking = { name: document.getElementById('booking-name').value, phone: document.getElementById('booking-phone').value, service: document.getElementById('booking-service').value, date: document.getElementById('booking-date').value, time: document.getElementById('booking-time').value, createdAt: new Date().toISOString() };
      const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
      bookings.push(booking);
      localStorage.setItem('bookings', JSON.stringify(bookings));
      document.getElementById('booking-success').classList.remove('hidden');
      this.reset();
      setTimeout(() => document.getElementById('booking-success').classList.add('hidden'), 3000);
    });
  </script>
</body>
</html>
