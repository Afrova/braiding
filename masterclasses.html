<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мастер-классы</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #fffafa; font-family: 'Segoe UI', system-ui, sans-serif; }
    .nav-link.active { color: #d950a9; font-weight: bold; border-bottom: 2px solid #d950a9; }
    .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; transition: all 0.2s; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.15); }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #fffafa; border-radius: 1.5rem; max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; }
    .modal-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; font-size: 2rem; cursor: pointer; color: #d950a9; }
  </style>
</head>
<body class="text-gray-800">
  <nav class="bg-white shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 flex flex-wrap justify-between items-center py-4">
      <a href="index.html" class="text-2xl font-bold" style="color: #d950a9;">Beauty Studio</a>
      <div class="flex flex-wrap gap-2 text-sm items-center">
        <a href="index.html" class="nav-link px-2 py-1 rounded">Главная</a>
        <a href="catalog-sets.html" class="nav-link px-2 py-1 rounded">Комплекты</a>
        <a href="masters.html" class="nav-link px-2 py-1 rounded">Мастера</a>
        <a href="portfolio.html" class="nav-link px-2 py-1 rounded">Работы</a>
        <a href="useful.html" class="nav-link px-2 py-1 rounded">Полезное</a>
        <a href="models.html" class="nav-link px-2 py-1 rounded">Модели</a>
        <a href="promotions.html" class="nav-link px-2 py-1 rounded">Акции</a>
        <a href="masterclasses.html" class="nav-link px-2 py-1 rounded active">Мастер-классы</a>
        <a href="profile.html" class="nav-link px-2 py-1 rounded">👤 ЛК</a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <h2 class="text-4xl font-bold mb-8" style="background: linear-gradient(135deg, #d950a9, #a532c2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Мастер-классы</h2>
    <div id="mc-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </main>

  <div id="mc-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" onclick="closeMcModal()">&times;</button>
      <div id="mc-body"></div>
    </div>
  </div>

  <footer class="bg-gray-900 text-white mt-20"><div class="container mx-auto px-4 py-8 text-center text-gray-400">© 2024 Beauty Studio</div></footer>

  <script>
    const mcs = [
      { id:1, title:"Колористика для профи", type:"очный", duration:"12 декабря, 10:00–15:00", price:3000, image:"https://placehold.co/400x250/f8d5e8/d950a9?text=Колористика", program:["Теория цвета","Техники окрашивания","Практика"], works:["https://placehold.co/200x200/e0c0e0/a532c2?text=Работа+1"] },
      { id:2, title:"Вечерние причёски", type:"очный", duration:"18 декабря, 14:00–17:00", price:2500, image:"https://placehold.co/400x250/f8d5e8/d950a9?text=Вечерние", program:["Укладки","Аксессуары"], works:["https://placehold.co/200x200/e0c0e0/a532c2?text=Работа+1"] },
      { id:3, title:"Базовый онлайн-курс", type:"онлайн", duration:"8 уроков", price:5000, image:"https://placehold.co/400x250/f8d5e8/d950a9?text=Онлайн", program:["Основы","Сложное окрашивание"], tariffs:[{name:"Самостоятельный",price:5000,includes:"Видеоуроки"},{name:"С поддержкой",price:8000,includes:"Проверка ДЗ"}], works:["https://placehold.co/200x200/e0c0e0/a532c2?text=Ученик+1"] }
    ];

    function openMc(id) {
      const m = mcs.find(m=>m.id===id);
      let h = `<img src="${m.image}" class="w-full h-56 object-cover rounded-xl mb-4"><h2 class="text-2xl font-bold">${m.title}</h2><p class="text-gray-500 mb-4">${m.type==='очный'?'📅 '+m.duration:'🎓 '+m.duration}</p><h3 class="font-bold text-lg" style="color:#d950a9;">Программа</h3><ul class="list-disc list-inside mb-4">${m.program.map(p=>`<li>${p}</li>`).join('')}</ul>`;
      if(m.tariffs){ h+='<h3 class="font-bold text-lg" style="color:#d950a9;">Тарифы</h3>'; m.tariffs.forEach(t=>h+=`<div class="bg-white p-4 rounded-xl shadow mb-2 border-l-4" style="border-color:#a532c2;"><p class="font-bold">${t.name} — ${t.price} ₽</p><p class="text-sm">${t.includes}</p></div>`); }
      h+=`<h3 class="font-bold text-lg mt-4" style="color:#d950a9;">Примеры работ</h3><div class="grid grid-cols-3 gap-2">${m.works.map(s=>`<img src="${s}" class="rounded w-full">`).join('')}</div><a href="booking.html" class="block text-center mt-6 py-3 rounded-xl text-white font-bold" style="background:linear-gradient(135deg,#d950a9,#a532c2);">Записаться</a>`;
      document.getElementById('mc-body').innerHTML=h; document.getElementById('mc-modal').classList.add('active');
    }
    function closeMcModal(){ document.getElementById('mc-modal').classList.remove('active'); }
    document.getElementById('mc-modal').addEventListener('click',e=>{ if(e.target===document.getElementById('mc-modal'))closeMcModal(); });

    document.getElementById('mc-grid').innerHTML = mcs.map(m=>`
      <div class="card flex flex-col">
        <img src="${m.image}" class="w-full h-44 object-cover rounded-lg mb-3">
        <h3 class="font-bold text-lg">${m.title}</h3>
        <p class="text-sm text-gray-500">${m.type==='очный'?'📅 '+m.duration:'🎓 '+m.duration}</p>
        <p class="text-xl font-bold mt-2" style="color:#d950a9;">${m.price} ₽</p>
        <button onclick="openMc(${m.id})" class="mt-3 w-full py-2 rounded-lg text-white" style="background:linear-gradient(135deg,#d950a9,#a532c2);">Подробности</button>
      </div>
    `).join('');
  </script>
</body>
</html>
