<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нужны модели</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #fffafa; font-family: 'Segoe UI', system-ui, sans-serif; }
    .nav-link.active { color: #d950a9; font-weight: bold; border-bottom: 2px solid #d950a9; }
    .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; transition: all 0.2s; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.15); }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #fffafa; border-radius: 1.5rem; max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; }
    .modal-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; font-size: 2rem; cursor: pointer; color: #d950a9; }
  </style>
</head>
<body class="text-gray-800">
  <nav class="bg-white shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 flex flex-wrap justify-between items-center py-4">
      <a href="index.html" class="text-2xl font-bold" style="color: #d950a9;">Beauty Studio</a>
      <div class="flex flex-wrap gap-2 text-sm items-center">
        <a href="index.html" class="nav-link px-2 py-1 rounded">Главная</a>
        <a href="catalog-sets.html" class="nav-link px-2 py-1 rounded">Комплекты</a>
        <a href="masters.html" class="nav-link px-2 py-1 rounded">Мастера</a>
        <a href="portfolio.html" class="nav-link px-2 py-1 rounded">Работы</a>
        <a href="useful.html" class="nav-link px-2 py-1 rounded">Полезное</a>
        <a href="models.html" class="nav-link px-2 py-1 rounded active">Модели</a>
        <a href="promotions.html" class="nav-link px-2 py-1 rounded">Акции</a>
        <a href="masterclasses.html" class="nav-link px-2 py-1 rounded">Мастер-классы</a>
        <a href="profile.html" class="nav-link px-2 py-1 rounded">👤 ЛК</a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <h2 class="text-4xl font-bold mb-4" style="background: linear-gradient(135deg, #d950a9, #a532c2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Нужны модели для причёсок</h2>
    <p class="text-gray-600 mb-6">Мы регулярно ищем моделей для отработки новых техник. Ознакомьтесь с условиями.</p>
    <a href="files/conditions.pdf" class="inline-block mb-8 py-3 px-8 rounded-xl text-white font-bold" style="background: #a532c2;" download>Скачать условия для моделей</a>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="models-grid"></div>
  </main>

  <div id="model-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModelModal()">&times;</button>
      <div id="model-detail"></div>
    </div>
  </div>

  <footer class="bg-gray-900 text-white mt-20"><div class="container mx-auto px-4 py-8 text-center text-gray-400">© 2024 Beauty Studio</div></footer>

  <script>
    const models = [
      { id: 1, name: "Дреды крючковые", date: "20 декабря", image: "https://placehold.co/400x300/f8d5e8/d950a9?text=Дреды+модель", desc: "Отработка техники крючковых дредов.", requirements: "Волосы ниже плеч, не окрашенные хной." },
      { id: 2, name: "Косы сенегальские", date: "22 декабря", image: "https://placehold.co/400x300/f8d5e8/d950a9?text=Косы+модель", desc: "Плетение сенегальских кос.", requirements: "Средняя длина, чистые волосы." },
      { id: 3, name: "Локоны Ариэль", date: "25 декабря", image: "https://placehold.co/400x300/f8d5e8/d950a9?text=Локоны+модель", desc: "Создание локонов Ариэль.", requirements: "Волосы любой длины." }
    ];

    function openModelModal(id) {
      const m = models.find(m => m.id === id);
      document.getElementById('model-detail').innerHTML = `
        <img src="${m.image}" class="w-full h-56 object-cover rounded-xl mb-4">
        <p class="text-sm text-gray-400 mb-2">Фото взято как пример у другой студии</p>
        <h2 class="text-2xl font-bold mb-2">${m.name}</h2>
        <p class="mb-4 text-gray-600">${m.desc}</p>
        <div class="mb-4"><label class="block text-sm font-bold mb-1">Длина волос</label><select class="w-full p-2 border rounded-lg"><option>Короткие</option><option>Средние</option><option>Длинные</option></select></div>
        <p class="text-2xl font-bold mb-4" style="color: #d950a9;">от 1 500 ₽</p>
        <p class="mb-4"><strong>Требования:</strong> ${m.requirements}</p>
        <a href="files/conditions.pdf" class="inline-block py-2 px-6 rounded-lg text-white font-bold mb-4" style="background: #a532c2;" download>Условия для моделей</a>
        <p class="mb-4"><strong>Мастер:</strong> <a href="masters.html" style="color: #d950a9;">Анна Ковалёва</a></p>
        <a href="booking.html" class="block text-center py-3 rounded-xl text-white font-bold" style="background: linear-gradient(135deg, #d950a9, #a532c2);">Записаться</a>
      `;
      document.getElementById('model-modal').classList.add('active');
    }
    function closeModelModal() { document.getElementById('model-modal').classList.remove('active'); }
    document.getElementById('model-modal').addEventListener('click', e => { if (e.target === document.getElementById('model-modal')) closeModelModal(); });

    document.getElementById('models-grid').innerHTML = models.map(m => `
      <div class="card">
        <img src="${m.image}" class="w-full h-44 object-cover rounded-lg mb-3">
        <p class="text-xs text-gray-400">Фото взято как пример у другой студии</p>
        <h3 class="font-bold text-lg mt-2">${m.name}</h3>
        <p class="text-sm text-gray-500">${m.date}</p>
        <div class="flex gap-2 mt-3">
          <a href="booking.html" class="flex-1 text-center py-2 rounded-lg text-white text-sm" style="background:#d950a9;">Запись</a>
          <button onclick="openModelModal(${m.id})" class="flex-1 py-2 rounded-lg text-white text-sm" style="background:#a532c2;">Подробнее</button>
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>
