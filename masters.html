<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наши мастера</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #fffafa; font-family: 'Segoe UI', system-ui, sans-serif; }
    .nav-link.active { color: #d950a9; font-weight: bold; border-bottom: 2px solid #d950a9; }
    .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; transition: all 0.2s; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 20px -5px rgba(0,0,0,0.15); }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal-content { background: #fffafa; border-radius: 1.5rem; max-width: 700px; width: 90%; max-height: 90vh; overflow-y: auto; padding: 2rem; position: relative; }
    .modal-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; font-size: 2rem; cursor: pointer; color: #d950a9; }
    .carousel-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 1rem; padding-bottom: 1rem; }
    .carousel-item { scroll-snap-align: start; min-width: 200px; max-width: 200px; }
  </style>
</head>
<body class="text-gray-800">
  <nav class="bg-white shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 flex flex-wrap justify-between items-center py-4">
      <a href="index.html" class="text-2xl font-bold" style="color: #d950a9;">Beauty Studio</a>
      <div class="flex flex-wrap gap-2 text-sm items-center">
        <a href="index.html" class="nav-link px-2 py-1 rounded">Главная</a>
        <a href="catalog-sets.html" class="nav-link px-2 py-1 rounded">Комплекты</a>
        <a href="masters.html" class="nav-link px-2 py-1 rounded active">Мастера</a>
        <a href="portfolio.html" class="nav-link px-2 py-1 rounded">Работы</a>
        <a href="useful.html" class="nav-link px-2 py-1 rounded">Полезное</a>
        <a href="models.html" class="nav-link px-2 py-1 rounded">Модели</a>
        <a href="promotions.html" class="nav-link px-2 py-1 rounded">Акции</a>
        <a href="masterclasses.html" class="nav-link px-2 py-1 rounded">Мастер-классы</a>
        <a href="profile.html" class="nav-link px-2 py-1 rounded">👤 ЛК</a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <h2 class="text-4xl font-bold mb-8" style="background: linear-gradient(135deg, #d950a9, #a532c2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Наши мастера</h2>
    <div id="masters-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
  </main>

  <div id="master-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" onclick="closeMasterModal()">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <footer class="bg-gray-900 text-white mt-20"><div class="container mx-auto px-4 py-8 text-center text-gray-400">© 2024 Beauty Studio</div></footer>

  <script>
    const masters = [
      { id: 1, name: "Анна Ковалёва", qual: "Стилист-колорист, стаж 10 лет", photo: "https://placehold.co/300x300/f8d5e8/d950a9?text=Анна", services: [{ name: "Дреды", time: "2 ч", price: 3500 }, { name: "Косы", time: "3 ч", price: 5000 }], works: ["https://placehold.co/200x200/e0c0e0/a532c2?text=Работа+1","https://placehold.co/200x200/e0c0e0/a532c2?text=Работа+2"], reviews: ["«Анна — профессионал своего дела!»", "«Лучшие дреды в городе»"] },
      { id: 2, name: "Елена Смирнова", qual: "Мастер по локонам, стаж 7 лет", photo: "https://placehold.co/300x300/f8d5e8/d950a9?text=Елена", services: [{ name: "Локоны Ариэль", time: "2.5 ч", price: 4000 }, { name: "Локоны Джессика", time: "3 ч", price: 5000 }], works: ["https://placehold.co/200x200/e0c0e0/a532c2?text=Локоны+1"], reviews: ["«Очень довольна результатом!»"] },
      { id: 3, name: "Ольга Петрова", qual: "Мастер по косам, стаж 5 лет", photo: "https://placehold.co/300x300/f8d5e8/d950a9?text=Ольга", services: [{ name: "Косы сенегальские", time: "4 ч", price: 6000 }, { name: "Косы ажурные", time: "3.5 ч", price: 5500 }], works: ["https://placehold.co/200x200/e0c0e0/a532c2?text=Косы+1","https://placehold.co/200x200/e0c0e0/a532c2?text=Косы+2"], reviews: ["«Ольга — мастер с золотыми руками!»"] }
    ];

    function openMasterModal(id) {
      const m = masters.find(m => m.id === id);
      let html = `<img src="${m.photo}" class="w-40 h-40 rounded-full mx-auto mb-4 object-cover"><h2 class="text-2xl font-bold text-center mb-2">${m.name}</h2><p class="text-center text-gray-500 mb-6">${m.qual}</p><h3 class="font-bold text-lg mb-3" style="color:#d950a9;">Услуги и стоимость</h3><ul class="list-disc list-inside mb-6 space-y-1">${m.services.map(s => `<li>${s.name} — ${s.time}, ${s.price} ₽</li>`).join('')}</ul><h3 class="font-bold text-lg mb-3" style="color:#d950a9;">Примеры работ</h3><div class="carousel-container mb-6">${m.works.map(src => `<div class="carousel-item"><img src="${src}" class="rounded-lg w-full"></div>`).join('')}</div><h3 class="font-bold text-lg mb-3" style="color:#d950a9;">Отзывы</h3>${m.reviews.map(r => `<p class="italic text-gray-600 mb-1">${r}</p>`).join('')}<div class="flex gap-3 mt-6"><a href="booking.html" class="flex-1 text-center py-3 rounded-xl text-white font-bold" style="background: linear-gradient(135deg, #d950a9, #a532c2);">Записаться</a><a href="catalog-sets.html" class="flex-1 text-center py-3 rounded-xl border-2 font-bold" style="border-color: #a532c2; color: #a532c2;">Выбрать комплект</a></div>`;
      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('master-modal').classList.add('active');
    }
    function closeMasterModal() { document.getElementById('master-modal').classList.remove('active'); }
    document.getElementById('master-modal').addEventListener('click', e => { if (e.target === document.getElementById('master-modal')) closeMasterModal(); });

    document.getElementById('masters-grid').innerHTML = masters.map(m => `
      <div class="card text-center">
        <img src="${m.photo}" class="w-32 h-32 rounded-full mx-auto mb-4 object-cover">
        <h3 class="font-bold text-xl mb-1">${m.name}</h3>
        <p class="text-sm text-gray-500 mb-4">${m.qual}</p>
        <div class="flex gap-2">
          <a href="booking.html" class="flex-1 py-2 text-sm rounded-lg text-white" style="background:#d950a9;">Записаться</a>
          <button onclick="openMasterModal(${m.id})" class="flex-1 py-2 text-sm rounded-lg text-white" style="background:#a532c2;">Подробнее</button>
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>
