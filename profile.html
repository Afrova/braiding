<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Личный кабинет</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #fffafa; font-family: 'Segoe UI', system-ui, sans-serif; }
    .filter-input { border: 1px solid #e5e7eb; padding: 0.75rem; border-radius: 0.75rem; background: white; width: 100%; }
    .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 1.5rem; }
  </style>
</head>
<body class="text-gray-800">
  <nav class="bg-white shadow-lg sticky top-0 z-50">
    <div class="container mx-auto px-4 flex flex-wrap justify-between items-center py-4">
      <a href="index.html" class="text-2xl font-bold" style="color: #d950a9;">Beauty Studio</a>
      <div class="flex gap-2 items-center">
        <span id="user-greeting" class="text-sm text-gray-600 mr-2"></span>
        <button onclick="logout()" class="text-sm text-red-500 hidden" id="logout-btn">Выйти</button>
        <a href="index.html" class="text-sm">← На главную</a>
      </div>
    </div>
  </nav>

  <main class="container mx-auto px-4 py-8">
    <div id="auth-section" class="hidden">
      <h2 class="text-4xl font-bold mb-8" style="background: linear-gradient(135deg, #d950a9, #a532c2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Вход / Регистрация</h2>
      <form id="auth-form" class="max-w-md bg-white p-8 rounded-2xl shadow space-y-4">
        <input type="text" id="auth-name" placeholder="ФИО" class="filter-input" required>
        <input type="tel" id="auth-phone" placeholder="Телефон" class="filter-input" required>
        <input type="email" id="auth-email" placeholder="Email" class="filter-input" required>
        <label class="flex items-center gap-2"><input type="checkbox" required> <span class="text-sm">Согласие на обработку ПД</span></label>
        <button type="submit" class="w-full py-3 rounded-xl text-white font-bold" style="background: linear-gradient(135deg, #d950a9, #a532c2);">Войти / Зарегистрироваться</button>
      </form>
    </div>

    <div id="lk-content" class="hidden">
      <h2 class="text-4xl font-bold mb-8" style="background: linear-gradient(135deg, #d950a9, #a532c2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Личный кабинет</h2>
      <div id="admin-link-container" class="mb-6 hidden"><a href="admin.html" class="inline-block py-3 px-8 rounded-xl text-white font-bold" style="background: #a532c2;">Перейти в админ-панель</a></div>
      <div class="card mb-6"><h3 class="font-bold text-xl mb-4">Мои друдли</h3><p class="text-4xl font-bold" style="color: #a532c2;" id="doodle-balance">0</p><div id="doodle-expiry" class="text-xs text-red-500 mt-1"></div></div>
      <div class="card mb-6"><h3 class="font-bold text-xl mb-4">Корзина (<span id="cart-count-lk">0</span>)</h3><div id="cart-items-lk" class="space-y-3 mb-4"></div><div class="flex items-center gap-4 mb-4"><label class="flex items-center"><input type="checkbox" id="use-doodles" onchange="updateCartSummary()"> Использовать друдли</label><input type="number" id="doodles-to-use" placeholder="Сколько?" class="filter-input w-24" min="0" disabled oninput="updateCartSummary()"></div><p class="text-xl font-bold">Итого: <span id="cart-total-lk" style="color:#d950a9;">0 ₽</span></p><button onclick="checkout()" class="mt-4 py-3 px-8 rounded-xl text-white font-bold" style="background: linear-gradient(135deg, #d950a9, #a532c2);">Оформить заказ</button><p id="checkout-message" class="text-sm text-green-600 mt-2 hidden">✅ Заказ оформлен! Друдли начислены.</p></div>
      <div class="card"><h3 class="font-bold text-xl mb-4">Последние заказы</h3><div id="orders-history"></div></div>
    </div>
  </main>

  <script>
    let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
    const ADMIN_PHONE = '89965954368';

    function updateUI() {
      const auth = document.getElementById('auth-section'), lk = document.getElementById('lk-content');
      const gr = document.getElementById('user-greeting'), lo = document.getElementById('logout-btn'), ad = document.getElementById('admin-link-container');
      if (currentUser
